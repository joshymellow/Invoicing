<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Log & Invoice System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="no-print">
        <h1>Invoice Manager</h1>
        <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">
            Logged as: <strong>codornizjoshuaisaiah@gmail.com</strong>
        </p>
        
        <div class="input-row">
            <div class="field">
                <label>Invoice #</label>
                <input type="text" id="invoiceNum" placeholder="e.g. INV-001" oninput="updateMeta()">
            </div>
            <div class="field">
                <label>Client Name</label>
                <input type="text" id="clientName" placeholder="Client Name" oninput="updateMeta()">
            </div>
            <div class="field">
                <label>Hourly Rate ($)</label>
                <input type="number" id="hourlyRate" step="0.01" oninput="updateMeta()">
            </div>
        </div>

        <hr>

        <h3>Log Work Entry</h3>
        <div class="log-row">
            <div class="field">
                <label>Date</label>
                <input type="date" id="taskDate">
            </div>
            <div class="field" style="flex: 2;">
                <label>Main Task</label>
                <input type="text" id="taskMain" placeholder="What was the primary focus?">
            </div>
            <div class="field">
                <label>Hours</label>
                <input type="number" id="taskDuration" placeholder="0.00" step="0.25">
            </div>
        </div>
        <div class="log-row">
            <div class="field">
                <label>Additional Comments (Enter for new bullet point)</label>
                <textarea id="taskComments" placeholder="• Detailed note 1&#10;• Detailed note 2" rows="3"></textarea>
            </div>
            <div class="field action" style="max-width: 200px;">
                <label>&nbsp;</label>
                <button class="btn-add" onclick="addTask()">Add to Invoice</button>
            </div>
        </div>

        <div class="toolbar">
            <button class="btn-print" onclick="window.print()">Print / Save PDF</button>
            <button class="btn-clear" onclick="clearInvoice()">Clear Entire Month</button>
        </div>
    </div>

    <div id="invoice-view">
        <header class="invoice-header">
            <div class="client-info">
                <h2 id="displayInvNum">INVOICE</h2>
                <p id="displayClient">To: [Client Name]</p>
            </div>
            <div class="meta-info">
                <p><strong>Contact:</strong> codornizjoshuaisaiah@gmail.com</p>
                <p><strong>Rate:</strong> <span id="displayRate"></span>/hr</p>
                <p><strong>Issued:</strong> <span id="issueDate"></span></p>
            </div>
        </header>

        <div id="tasksContainer">
            </div>

        <footer class="invoice-footer">
            <div class="total-box">
                <span>Grand Total Due:</span>
                <span id="totalDisplay">$0.00</span>
            </div>
        </footer>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
