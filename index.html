<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Invoice Generator</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Input Section Styling */
        .no-print {
            background: #fff;
            padding-bottom: 30px;
            border-bottom: 2px dashed #ddd;
            margin-bottom: 40px;
        }

        h1 { color: var(--primary-color); margin-top: 0; }
        
        .input-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-add { background-color: var(--accent-color); color: white; }
        .btn-print { background-color: var(--success-color); color: white; margin-right: 10px; }
        .btn-clear { background-color: var(--danger-color); color: white; }
        button:hover { opacity: 0.8; }

        /* Invoice Styling */
        #invoice-render {
            padding: 20px;
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background-color: #f8f9fa;
            text-align: left;
            border-bottom: 2px solid #dee2e6;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
        }

        .total-section {
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Print Media Query */
        @media print {
            body { background-color: white; padding: 0; }
            .container { box-shadow: none; max-width: 100%; width: 100%; padding: 0; }
            .no-print { display: none !important; }
            .delete-cell { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Dashboard / Editor -->
        <div class="no-print">
            <h1>Invoice Manager</h1>
            
            <div class="input-row">
                <input type="text" id="invoiceNum" placeholder="Invoice Number (e.g. #001)" oninput="updateMeta()">
                <input type="text" id="clientName" placeholder="Client Name" oninput="updateMeta()">
                <input type="number" id="hourlyRate" placeholder="Rate $/hr" value="50" oninput="updateMeta()">
            </div>

            <div class="input-row">
                <input type="text" id="taskDesc" placeholder="Work Description...">
                <input type="number" id="taskDuration" placeholder="Hours" step="0.25">
                <span></span> <!-- spacer -->
                <button class="btn-add" onclick="addTask()">+ Add Item</button>
            </div>

            <div style="margin-top: 20px;">
                <button class="btn-print" onclick="window.print()">Print / Save PDF</button>
                <button class="btn-clear" onclick="clearInvoice()">Reset All</button>
            </div>
        </div>

        <!-- The Actual Invoice -->
        <div id="invoice-render">
            <div class="invoice-header">
                <div>
                    <h2 id="displayInvNum">INVOICE #001</h2>
                    <p id="displayClient">To: [Client Name]</p>
                </div>
                <div style="text-align: right;">
                    <p><strong>Date:</strong> <span id="currentDate"></span></p>
                    <p><strong>Rate:</strong> <span id="displayRate">$50.00</span>/hr</p>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Hours</th>
                        <th>Amount</th>
                        <th class="no-print delete-cell"></th>
                    </tr>
                </thead>
                <tbody id="taskList">
                    <!-- Tasks injected here -->
                </tbody>
            </table>

            <div class="total-section">
                Total Due: <span id="totalDisplay">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        let invoiceData = JSON.parse(localStorage.getItem('myInvoiceData')) || {
            num: '001',
            client: '',
            rate: 50,
            tasks: []
        };

        // Initialize page
        window.onload = () => {
            document.getElementById('invoiceNum').value = invoiceData.num;
            document.getElementById('clientName').value = invoiceData.client;
            document.getElementById('hourlyRate').value = invoiceData.rate;
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString();
            render();
        };

        function updateMeta() {
            invoiceData.num = document.getElementById('invoiceNum').value;
            invoiceData.client = document.getElementById('clientName').value;
            invoiceData.rate = parseFloat(document.getElementById('hourlyRate').value) || 0;
            save();
            render();
        }

        function addTask() {
            const descEl = document.getElementById('taskDesc');
            const durEl = document.getElementById('taskDuration');
            
            const desc = descEl.value;
            const duration = parseFloat(durEl.value);

            if (desc && !isNaN(duration)) {
                invoiceData.tasks.push({
                    description: desc,
                    duration: duration
                });
                
                descEl.value = '';
                durEl.value = '';
                save();
                render();
            } else {
                alert("Please enter a description and hour amount.");
            }
        }

        function deleteTask(index) {
            invoiceData.tasks.splice(index, 1);
            save();
            render();
        }

        function clearInvoice() {
            if (confirm("Reset everything? This cannot be undone.")) {
                invoiceData = { num: '001', client: '', rate: 50, tasks: [] };
                document.getElementById('invoiceNum').value = '001';
                document.getElementById('clientName').value = '';
                document.getElementById('hourlyRate').value = 50;
                save();
                render();
            }
        }

        function save() {
            localStorage.setItem('myInvoiceData', JSON.stringify(invoiceData));
        }

        function render() {
            // Update Header
            document.getElementById('displayInvNum').innerText = `INVOICE #${invoiceData.num}`;
            document.getElementById('displayClient').innerText = invoiceData.client ? `To: ${invoiceData.client}` : 'To: [Client Name]';
            document.getElementById('displayRate').innerText = `$${invoiceData.rate.toFixed(2)}`;

            // Update Table
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            let grandTotal = 0;

            invoiceData.tasks.forEach((task, index) => {
                const amount = task.duration * invoiceData.rate;
                grandTotal += amount;

                list.innerHTML += `
                    <tr>
                        <td>${task.description}</td>
                        <td>${task.duration}</td>
                        <td>$${amount.toFixed(2)}</td>
                        <td class="no-print delete-cell">
                            <button class="btn-clear" style="padding: 2px 8px;" onclick="deleteTask(${index})">✕</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalDisplay').innerText = `$${grandTotal.toFixed(2)}`;
        }
    </script>
</body>
</html>
