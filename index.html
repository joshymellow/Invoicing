<div class="no-print">
    <h1>Invoice Manager v1.7</h1>
    
    <div id="statsBar" class="stats-grid">
        <div class="stat-card">Hours This Month: <span id="statHours">0</span></div>
        <div class="stat-card">Daily Avg: <span id="statAvg">0</span></div>
        <div class="stat-card">Theme: 
            <select id="themeSelect" onchange="changeTheme()">
                <option value="classic">Classic Blue</option>
                <option value="minimal">Minimalist Gray</option>
            </select>
        </div>
    </div>

    <div class="input-row">
        </div>

    <hr>

    <div class="toolbar">
        <button class="btn-print" onclick="window.print()">Print / PDF</button>
        <button class="btn-secondary" onclick="exportData()">💾 Backup JSON</button>
        <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📂 Restore Backup</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        <button class="btn-clear" onclick="archiveMonth()">📁 Archive & Close Month</button>
        <button class="btn-clear" onclick="clearInvoice()">Clear All</button>
        <button id="btn-undo" class="btn-undo" style="display:none;" onclick="undoClear()">Undo</button>
    </div>
</div>
