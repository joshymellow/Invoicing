<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My GitHub Invoice Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="no-print">
        <h1>Daily Task Logger</h1>
        <div class="input-group">
            <input type="text" id="taskDesc" placeholder="What did you work on?">
            <input type="number" id="taskDuration" placeholder="Hours (e.g. 1.5)">
            <button onclick="addTask()">Add Task</button>
        </div>
        <button onclick="window.print()" class="print-btn">Generate Invoice (Print)</button>
    </div>

    <div id="invoice">
        <h2>INVOICE</h2>
        <table id="taskTable">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Duration (Hrs)</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="taskList">
                </tbody>
        </table>
        <h3 id="totalDisplay">Total: $0.00</h3>
    </div>

    <script src="script.js"></script>
</body>
</html>
