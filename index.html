<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Invoice Manager v1.8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="no-print">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Invoice Manager v1.8</h1>
            <div class="theme-selector">
                <label style="font-size: 0.8rem;">Theme:</label>
                <select id="themeSelect" onchange="changeTheme()">
                    <option value="classic">Classic Blue</option>
                    <option value="minimal">Minimalist Gray</option>
                </select>
            </div>
        </header>

        <!-- DASHBOARD STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <label>Total Hours</label>
                <div id="statHours">0.00</div>
            </div>
            <div class="stat-card">
                <label>Avg Daily Pay</label>
                <div id="statAvg">$0.00</div>
            </div>
            <div class="stat-card">
                <label>Active Tasks</label>
                <div id="statTasks">0</div>
            </div>
        </div>
        
        <div class="input-row">
             <div class="field" style="flex: 1.5;">
                <label>Your Name / Company</label>
                <input type="text" id="userName" oninput="updateMeta()" placeholder="Your Name">
            </div>
            <div class="field" style="flex: 2;">
                <label>Contact Info</label>
                <input type="text" id="contactInfo" oninput="updateMeta()" placeholder="email@example.com">
            </div>
        </div>

        <div class="input-row">
            <div class="field">
                <label>Invoice #</label>
                <input type="text" id="invoiceNum" oninput="updateMeta()" placeholder="INV-001">
            </div>
            <div class="field" style="flex: 1.5;">
                <label>Client Name</label>
                <input type="text" id="clientName" oninput="updateMeta()" placeholder="Client Name">
            </div>
            <div class="field" style="max-width: 100px;">
                <label>Rate ($)</label>
                <input type="number" id="hourlyRate" step="0.01" oninput="updateMeta()">
            </div>
        </div>

        <hr>

        <h3>Log Work Entry</h3>
        <div class="log-row">
            <div class="field">
                <label>Date</label>
                <input type="date" id="taskDate">
            </div>
            <div class="field" style="flex: 2;">
                <label>Main Task</label>
                <input type="text" id="taskMain" placeholder="Primary Task Description">
            </div>
            <div class="field">
                <label>Hours</label>
                <input type="number" id="taskDuration" step="0.25" placeholder="0.00">
            </div>
        </div>
        <div class="log-row">
            <div class="field">
                <label>Additional Comments (New line = New bullet)</label>
                <textarea id="taskComments" rows="3" placeholder="• Detailed note 1&#10;• Detailed note 2"></textarea>
            </div>
            <div class="field action" style="max-width: 250px;">
                <label>&nbsp;</label>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-add" onclick="addTask()">Add to Invoice</button>
                    <button id="btn-cancel" class="btn-secondary" style="display:none;" onclick="cancelEdit()">Cancel</button>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <button class="btn-print" onclick="window.print()">Print / PDF</button>
            <button class="btn-util" onclick="toggleHistory()">📜 View History</button>
            <button class="btn-util" onclick="exportData()">💾 Backup JSON</button>
            <button class="btn-util" onclick="document.getElementById('importFile').click()">📂 Restore</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            <button class="btn-archive" onclick="archiveMonth()">📁 Close Month</button>
            <button class="btn-clear" onclick="clearInvoice()">Clear All</button>
            <button id="btn-undo" class="btn-undo" style="display:none;" onclick="undoClear()">Undo</button>
        </div>
    </div>

    <!-- INVOICE VIEW -->
    <div id="invoice-view">
        <header class="invoice-header">
            <div>
                <h2 id="displayUserName" style="margin:0;">[Your Name]</h2>
                <p style="margin:5px 0 0 0;">Contact: <span id="displayContact"></span></p>
            </div>
            <div style="text-align: right;">
                <h3 id="displayInvNum" style="margin:0;">INVOICE</h3>
                <p style="margin:5px 0 0 0;">Client: <span id="displayClient"></span></p>
                <p style="margin:2px 0 0 0;">Rate: <span id="displayRate"></span>/hr</p>
                <p style="margin:2px 0 0 0;">Issued: <span id="issueDate"></span></p>
            </div>
        </header>

        <div id="tasksContainer"></div>

        <footer class="invoice-footer">
            <div class="total-box">
                <span>Grand Total Due:</span>
                <span id="totalDisplay">$0.00</span>
            </div>
        </footer>
    </div>
</div>

<!-- HISTORY MODAL -->
<div id="historyModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <header style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:15px;">
            <h2 style="margin:0;">Archived Invoices</h2>
            <button onclick="toggleHistory()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#666;">✕</button>
        </header>
        <div id="historyList">
            <!-- Archived items will appear here -->
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
